<script>
window.__initMazo = async function() {
  if (typeof L === 'undefined') {
    console.error('Leaflet sigue sin estar disponible');
    return;
  }

  async function loadData() {
    const response = await fetch('data.json', { cache: 'no-store' });
    if (!response.ok) throw new Error('No se pudo cargar data.json');
    return response.json();
  }

// === DATASET ===
// Mezquitas mÃ¡s significativas y grandes del mundo
// Tradiciones: sunni, shia, ibadi, historica, sufismo
const DATA = await loadData();

// === TRADICIONES ===
const DENOMS = {
  sunni:     { label: "SunÃ­",      color: "#1a8a5c" },
  shia:      { label: "ChiÃ­",      color: "#8a2a2a" },
  ibadi:     { label: "IbadÃ­",     color: "#6b5b3a" },
  historica: { label: "HistÃ³rica", color: "#8a7b6b" },
  sufismo:   { label: "Sufismo",   color: "#5a4a8a" }
};

// === STATE ===
const state = {
  activeDenoms: new Set(Object.keys(DENOMS)),
  searchTerm: "",
  selectedId: null,
  showVisitedOnly: false
};

const VISITED_KEY = 'mazo_mezquitas_visited_v1';
const visitedIds = new Set(loadVisitedIds());

function loadVisitedIds() {
  try {
    const raw = localStorage.getItem(VISITED_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(Number.isInteger);
  } catch {
    return [];
  }
}

function saveVisitedIds() {
  localStorage.setItem(VISITED_KEY, JSON.stringify([...visitedIds]));
}

function isVisited(id) {
  return visitedIds.has(id);
}

function toggleVisited(id) {
  if (visitedIds.has(id)) visitedIds.delete(id);
  else visitedIds.add(id);
  saveVisitedIds();
  const marker = markers.find(m => m._data._id === id);
  if (marker) {
    marker.setIcon(createMarkerIcon(marker._data));
    marker.setPopupContent(buildPopup(marker._data));
  }
  render();
}

// === MAP INIT ===
const map = L.map('map', {
  center: [25, 45],
  zoom: 3,
  minZoom: 2,
  maxZoom: 18,
  worldCopyJump: true,
  zoomControl: true
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &middot; &copy; CARTO &middot; Forja Nova',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// === MARKERS ===
const markers = [];

function createMarkerIcon(d) {
  const color = DENOMS[d.denom].color;
  const visitedClass = isVisited(d._id) ? ' is-visited' : '';
  return L.divIcon({
    className: '',
    html: `<div class="mosque-marker${visitedClass}" style="background:${color};color:${color}"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });
}

async function buildMarkersInBatches() {
  const batchSize = 250;
  for (let start = 0; start < DATA.length; start += batchSize) {
    const end = Math.min(start + batchSize, DATA.length);
    for (let idx = start; idx < end; idx++) {
      const d = DATA[idx];
      d._id = idx;
      const icon = createMarkerIcon(d);
      const marker = L.marker([d.lat, d.lng], { icon });
      marker.bindPopup(buildPopup(d), { maxWidth: 320, closeButton: true });
      marker._data = d;
      markers.push(marker);
    }
    // Yield to the browser between batches to keep UI responsive with large datasets.
    if (end < DATA.length) await new Promise(resolve => setTimeout(resolve, 0));
  }
}

await buildMarkersInBatches();

function buildPopup(d) {
  const denom = DENOMS[d.denom];
  const visited = isVisited(d._id);
  return `
    <div class="popup-denom-bar" style="background:${denom.color}"></div>
    <div class="popup-inner">
      <div class="popup-name">${d.name}</div>
      <div class="popup-loc">${d.city} &middot; ${d.country}</div>
      <dl class="popup-meta">
        <dt>Tradici&oacute;n</dt><dd>${denom.label}</dd>
        ${d.year ? `<dt>Fundaci&oacute;n</dt><dd>${d.year}</dd>` : ''}
      </dl>
      ${d.note ? `<div class="popup-note">${d.note}</div>` : ''}
      <div class="popup-actions">
        <button class="visit-btn ${visited ? 'visited' : ''}" data-visit-id="${d._id}">${visited ? '&#10003; Visitada' : 'Marcar visitada'}</button>
      </div>
      <a class="popup-link" href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lng}" target="_blank" rel="noopener">&rarr; ver en mapa</a>
    </div>
  `;
}

// === FILTERS UI ===
const filtersEl = document.getElementById('filters');
const denomChips = {};
const denomCountEls = {};
Object.entries(DENOMS).forEach(([key, info]) => {
  const count = DATA.filter(d => d.denom === key).length;
  const chip = document.createElement('div');
  chip.className = 'filter-chip active';
  chip.dataset.denom = key;
  chip.innerHTML = `
    <span class="dot"></span>
    <span class="label">${info.label}</span>
    <span class="count">${count}</span>
  `;
  chip.addEventListener('click', () => {
    if (state.activeDenoms.has(key)) state.activeDenoms.delete(key);
    else state.activeDenoms.add(key);
    chip.classList.toggle('active');
    render();
  });
  denomChips[key] = chip;
  denomCountEls[key] = chip.querySelector('.count');
  filtersEl.appendChild(chip);
});

const visitedFilterChip = document.createElement('div');
visitedFilterChip.className = 'filter-chip';
visitedFilterChip.dataset.denom = 'visitadas';
visitedFilterChip.innerHTML = `
  <span class="dot"></span>
  <span class="label">Visitadas</span>
  <span class="count" id="visited-filter-count">${visitedIds.size}</span>
`;
visitedFilterChip.addEventListener('click', () => {
  state.showVisitedOnly = !state.showVisitedOnly;
  visitedFilterChip.classList.toggle('active', state.showVisitedOnly);
  render();
});
filtersEl.appendChild(visitedFilterChip);

// === SEARCH ===
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', (e) => {
  state.searchTerm = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById('filter-all').addEventListener('click', () => {
  state.activeDenoms = new Set(Object.keys(DENOMS));
  Object.values(denomChips).forEach(chip => chip.classList.add('active'));
  render();
});

document.getElementById('filter-none').addEventListener('click', () => {
  state.activeDenoms.clear();
  Object.values(denomChips).forEach(chip => chip.classList.remove('active'));
  render();
});

document.getElementById('filter-reset').addEventListener('click', () => {
  state.activeDenoms = new Set(Object.keys(DENOMS));
  state.showVisitedOnly = false;
  state.searchTerm = '';
  searchEl.value = '';
  Object.values(denomChips).forEach(chip => chip.classList.add('active'));
  visitedFilterChip.classList.remove('active');
  render();
});

// === LIST ===
const listEl = document.getElementById('list');
const visibleCountEl = document.getElementById('visible-count');
const totalCountEl = document.getElementById('total-count');
totalCountEl.textContent = DATA.length;

function matchesSearch(d) {
  if (!state.searchTerm) return true;
  const hay = `${d.name} ${d.city} ${d.country}`.toLowerCase();
  return hay.includes(state.searchTerm);
}

function filteredData() {
  return DATA.filter(d => {
    if (!state.activeDenoms.has(d.denom)) return false;
    if (state.showVisitedOnly && !isVisited(d._id)) return false;
    if (!matchesSearch(d)) return false;
    return true;
  });
}

function render() {
  const visible = filteredData();
  visibleCountEl.textContent = visible.length;
  const visitedFilterCountEl = document.getElementById('visited-filter-count');
  if (visitedFilterCountEl) visitedFilterCountEl.textContent = visitedIds.size;
  Object.keys(DENOMS).forEach(key => {
    const count = DATA.filter(d => d.denom === key && (!state.showVisitedOnly || isVisited(d._id)) && matchesSearch(d)).length;
    if (denomCountEls[key]) denomCountEls[key].textContent = count;
    if (denomChips[key]) denomChips[key].classList.toggle('is-empty', count === 0);
  });

  // Markers
  markers.forEach(m => {
    const shouldShow = visible.some(v => v._id === m._data._id);
    if (shouldShow && !map.hasLayer(m)) m.addTo(map);
    else if (!shouldShow && map.hasLayer(m)) map.removeLayer(m);
  });

  // List
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">sin resultados</div>';
    return;
  }
  const sorted = [...visible].sort((a,b) => a.name.localeCompare(b.name, 'es'));
  sorted.forEach(d => {
    const denom = DENOMS[d.denom];
    const item = document.createElement('div');
    item.className = 'list-item';
    if (isVisited(d._id)) item.classList.add('visited');
    if (state.selectedId === d._id) item.classList.add('active');
    item.innerHTML = `
      <div class="list-item-name">${d.name}${isVisited(d._id) ? '<span class="list-item-check">&#10003;</span>' : ''}</div>
      <div class="list-item-meta">
        <span class="denom-dot" style="background:${denom.color}"></span>
        <span>${d.city} &middot; ${d.country}</span>
      </div>
    `;
    item.addEventListener('click', () => {
      state.selectedId = d._id;
      const marker = markers.find(m => m._data._id === d._id);
      if (marker) {
        map.flyTo([d.lat, d.lng], 10, { duration: 0.9 });
        setTimeout(() => marker.openPopup(), 950);
      }
      render();
    });
    listEl.appendChild(item);
  });
}

render();

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.visit-btn');
  if (!btn) return;
  const id = Number(btn.dataset.visitId);
  if (!Number.isInteger(id)) return;
  toggleVisited(id);
});

// === MOBILE SIDEBAR TOGGLE ===
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.add('open');
  sidebarToggle.style.display = 'none';
});
sidebarClose.addEventListener('click', () => {
  sidebar.classList.remove('open');
  sidebarToggle.style.display = '';
});
listEl.addEventListener('click', (e) => {
  if (e.target.closest('.list-item') && window.innerWidth <= 768) {
    sidebar.classList.remove('open');
    sidebarToggle.style.display = '';
  }
});
}; // end __initMazo

// Auto-init
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof L !== 'undefined') window.__initMazo();
  });
} else {
  if (typeof L !== 'undefined') window.__initMazo();
}
</script>
</body>
</html>
