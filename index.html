<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MazoMezquitas · Atlas Islámico Mundial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof L === 'undefined') {
      console.warn('Leaflet no cargó desde cdnjs, intentando unpkg...');
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(css);
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.onload = () => window.__initMazo && window.__initMazo();
      s.onerror = () => {
        document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:#e8e3d5;background:#0c0e0f;height:100vh;">ERROR: No se pudo cargar Leaflet. Revisa tu conexión.</div>';
      };
      document.head.appendChild(s);
    }
  });
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e0f;
    --bg-panel: #141618;
    --bg-panel-alt: #1c1f22;
    --fg: #e3ddd0;
    --fg-dim: #a09888;
    --fg-faded: #5f5a50;
    --accent: #1a8a5c;       /* verde esmeralda islámico */
    --accent-dim: #126b45;
    --accent-light: #2cb77a;
    --gold: #c9a227;         /* oro */
    --border: #242820;
    --sunni: #1a8a5c;        /* verde esmeralda */
    --shia: #8a2a2a;         /* granate */
    --ibadi: #6b5b3a;        /* ámbar oscuro */
    --historica: #8a7b6b;    /* gris piedra */
    --sufismo: #5a4a8a;      /* púrpura */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }

  /* Mobile toggle button */
  .mobile-toggle {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1100;
    background: var(--bg-panel);
    color: var(--accent-light);
    border: 1px solid var(--accent-dim);
    padding: 12px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    transition: all 0.2s;
  }
  .mobile-toggle:hover, .mobile-toggle:active {
    background: var(--bg-panel-alt);
    border-color: var(--accent);
  }
  .mobile-toggle .toggle-icon { margin-right: 8px; }

  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      position: relative;
    }
    .mobile-toggle { display: block; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: 0;
      z-index: 1000;
      max-height: 100vh;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: none;
      border-top: 2px solid var(--accent-dim);
    }
    .sidebar.open {
      transform: translateY(0);
    }
    .sidebar .brand {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .sidebar .brand-sub,
    .sidebar .brand-meta { display: none; }
    .sidebar .brand-title { font-size: 20px; }
    .mobile-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      font-size: 20px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mobile-close:hover { color: var(--accent); border-color: var(--accent); }
    .search-wrap { padding: 10px 16px; }
    .search-input { padding: 12px; font-size: 14px; }
    .filters { padding: 10px 16px; }
    .filters .filter-group {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filters .filter-chip {
      padding: 8px 10px;
      font-size: 11px;
      flex: 0 0 auto;
    }
    .filters .filter-chip .label { font-size: 11px; }
    .stats { padding: 8px 16px; font-size: 12px; }
    .list-item { padding: 12px 16px; }
    .list-item-name { font-size: 16px; }
    .list-item-meta { font-size: 11px; margin-top: 4px; }
    .foot { padding: 8px 16px; }
    .map-wrap { grid-row: 1; grid-column: 1; }
    .map-badge { display: none; }
    .leaflet-popup-content { min-width: 200px; max-width: 280px; }
    .popup-name { font-size: 16px; }
    .popup-inner { padding: 12px 14px; }
  }

  /* Hide close button on desktop */
  .mobile-close { display: none; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-panel-alt) 0%, var(--bg-panel) 100%);
  }
  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--fg);
    line-height: 1;
  }
  .brand-title .amp { color: var(--accent-light); font-style: italic; font-weight: 400; }
  .brand-sub {
    margin-top: 6px;
    font-size: 10px;
    color: var(--fg-faded);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .brand-meta {
    margin-top: 10px;
    font-size: 10px;
    color: var(--accent-dim);
    font-family: 'IBM Plex Mono', monospace;
  }
  .brand-meta::before { content: "☪ "; color: var(--accent-light); }

  /* Search */
  .search-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 9px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--fg-faded); }

  /* Filters */
  .filters { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .filters-label {
    font-size: 9px;
    color: var(--fg-faded);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-tools {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .filter-mini-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 6px 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .filter-mini-btn:hover { color: var(--accent-light); border-color: var(--accent-dim); }
  .filter-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    user-select: none;
  }
  .filter-chip:hover { border-color: var(--fg-dim); }
  .filter-chip.active { border-color: currentColor; background: var(--bg-panel-alt); }
  .filter-chip .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .filter-chip .label { flex: 1; color: var(--fg); }
  .filter-chip .count { color: var(--fg-faded); font-size: 10px; }
  .filter-chip[data-denom="sunni"] { color: var(--sunni); }
  .filter-chip[data-denom="shia"] { color: var(--shia); }
  .filter-chip[data-denom="ibadi"] { color: var(--ibadi); }
  .filter-chip[data-denom="historica"] { color: var(--historica); }
  .filter-chip[data-denom="sufismo"] { color: var(--sufismo); }
  .filter-chip[data-denom="visitadas"] { color: var(--accent-light); }
  .filter-chip.is-empty { opacity: 0.45; }

  /* Stats */
  .stats {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--fg-dim);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .stats .num { color: var(--accent-light); font-weight: 500; font-size: 14px; }

  /* List */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-track { background: var(--bg-panel); }
  .list::-webkit-scrollbar-thumb { background: var(--border); }
  .list::-webkit-scrollbar-thumb:hover { background: var(--fg-faded); }

  .list-item {
    padding: 10px 20px;
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .list-item:hover { background: var(--bg-panel-alt); border-left-color: var(--accent); }
  .list-item.active { background: var(--bg-panel-alt); border-left-color: var(--accent); }
  .list-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    color: var(--fg);
    font-weight: 600;
    line-height: 1.2;
  }
  .list-item-meta {
    font-size: 10px;
    color: var(--fg-faded);
    margin-top: 3px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .list-item-meta .denom-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* Footer */
  .foot {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: var(--fg-faded);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }
  .foot .accent { color: var(--accent-light); }

  /* Map */
  .map-wrap { position: relative; }
  #map { height: 100%; width: 100%; background: #080a0c; }

  /* Dark Leaflet overrides */
  .leaflet-container {
    background: #080a0c;
    font-family: 'IBM Plex Mono', monospace;
  }
  .leaflet-control-zoom a {
    background: var(--bg-panel) !important;
    color: var(--fg) !important;
    border: 1px solid var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg-panel-alt) !important;
    color: var(--accent-light) !important;
  }
  .leaflet-control-attribution {
    background: rgba(12, 14, 15, 0.85) !important;
    color: var(--fg-faded) !important;
    font-size: 9px !important;
    font-family: 'IBM Plex Mono', monospace !important;
  }
  .leaflet-control-attribution a { color: var(--fg-dim) !important; }

  /* Custom markers */
  .mosque-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px currentColor, 0 2px 6px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }
  .mosque-marker:hover { transform: scale(1.4); }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: var(--bg-panel) !important;
    color: var(--fg) !important;
    border-radius: 2px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    font-family: 'IBM Plex Mono', monospace;
    min-width: 240px;
  }
  .leaflet-popup-tip { background: var(--bg-panel) !important; border: 1px solid var(--border) !important; }
  .leaflet-popup-close-button {
    color: var(--fg-faded) !important;
    font-size: 18px !important;
    padding: 6px 8px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--accent-light) !important; }

  .popup-inner { padding: 14px 16px; }
  .popup-denom-bar { height: 3px; width: 100%; background: var(--accent); }
  .popup-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--fg);
    margin-bottom: 2px;
  }
  .popup-loc {
    font-size: 10px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .popup-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 11px;
    margin-bottom: 10px;
  }
  .popup-meta dt { color: var(--fg-faded); text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
  .popup-meta dd { color: var(--fg); }
  .popup-note {
    font-size: 11px;
    color: var(--fg-dim);
    line-height: 1.45;
    font-style: italic;
    border-left: 2px solid var(--accent);
    padding-left: 8px;
    margin-top: 8px;
  }
  .popup-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    color: var(--accent-light);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent-dim);
    padding-bottom: 1px;
  }
  .popup-link:hover { color: var(--fg); border-color: var(--fg); }
  .popup-actions {
    margin-top: 10px;
    display: flex;
  }
  .visit-btn {
    width: 100%;
    background: var(--bg);
    color: var(--accent-light);
    border: 1px solid var(--accent-dim);
    padding: 8px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .visit-btn:hover { border-color: var(--accent); color: var(--fg); }
  .visit-btn.visited {
    background: rgba(44, 183, 122, 0.12);
    border-color: var(--accent-light);
    color: var(--accent-light);
  }

  .mosque-marker.is-visited {
    box-shadow: 0 0 0 1px currentColor, 0 0 0 4px rgba(44, 183, 122, 0.22), 0 2px 6px rgba(0,0,0,0.5);
  }
  .list-item.visited .list-item-name { color: var(--accent-light); }
  .list-item-check {
    color: var(--accent-light);
    font-size: 11px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Legend overlay */
  .map-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 500;
    background: rgba(20, 22, 24, 0.9);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 10px;
    color: var(--fg-faded);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .map-badge .accent-dot::before {
    content: "☪";
    color: var(--accent-light);
    margin-right: 6px;
  }

  .no-results {
    padding: 24px 20px;
    text-align: center;
    color: var(--fg-faded);
    font-size: 11px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div>
        <div class="brand-title">Mazo<span class="amp">&</span>Mezquitas</div>
        <div class="brand-sub">Atlas Islámico Mundial</div>
        <div class="brand-meta">forja nova · registro cartográfico</div>
      </div>
      <button class="mobile-close" id="sidebar-close" aria-label="Cerrar panel">&times;</button>
    </div>

    <div class="search-wrap">
      <input type="text" class="search-input" id="search" placeholder="buscar mezquita, ciudad, país…">
    </div>

    <div class="filters">
      <div class="filters-label">Tradiciones</div>
      <div class="filter-group" id="filters"></div>
      <div class="filter-tools">
        <button class="filter-mini-btn" id="filter-all">todas</button>
        <button class="filter-mini-btn" id="filter-none">ninguna</button>
        <button class="filter-mini-btn" id="filter-reset">reset</button>
      </div>
    </div>

    <div class="stats">
      <span><span class="num" id="visible-count">0</span> visibles</span>
      <span>de <span id="total-count">0</span> registradas</span>
    </div>

    <div class="list" id="list"></div>

    <div class="foot">
      <span>v0.1 · prototipo</span>
      <span class="accent">foc i ferro</span>
    </div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-badge"><span class="accent-dot"></span>clic en marcador</div>
  </div>
  <button class="mobile-toggle" id="sidebar-toggle">
    <span class="toggle-icon">&#9776;</span> Explorar mezquitas
  </button>
</div>

<script>
window.__initMazo = function() {
  if (typeof L === 'undefined') {
    console.error('Leaflet sigue sin estar disponible');
    return;
  }

// === DATASET ===
// Mezquitas más significativas y grandes del mundo
// Tradiciones: sunni, shia, ibadi, historica, sufismo
const DATA = [
  // === ARABIA SAUDÍ — LAS DOS SAGRADAS ===
  {name:"Masjid al-Haram", city:"La Meca", country:"Arabia Saudí", lat:21.4225, lng:39.8262, denom:"sunni", year:638, note:"La mezquita más grande y sagrada del islam. Alberga la Kaaba. Capacidad: 4 millones de fieles."},
  {name:"Masjid an-Nabawi", city:"Medina", country:"Arabia Saudí", lat:24.4672, lng:39.6112, denom:"sunni", year:622, note:"Mezquita del Profeta. Segunda más sagrada. Tumba de Muhammad ﷺ."},
  {name:"Masjid al-Qiblatayn", city:"Medina", country:"Arabia Saudí", lat:24.4808, lng:39.5753, denom:"sunni", year:623, note:"Mezquita de las Dos Qiblas. Donde se cambió la dirección de oración hacia La Meca."},
  {name:"Masjid Quba", city:"Medina", country:"Arabia Saudí", lat:24.4398, lng:39.6166, denom:"sunni", year:622, note:"La primera mezquita construida en el islam."},

  // === JERUSALÉN ===
  {name:"Masjid al-Aqsa", city:"Jerusalén", country:"Palestina", lat:31.7761, lng:35.2358, denom:"sunni", year:705, note:"Tercera mezquita más sagrada del islam. Destino del Viaje Nocturno (Isra)."},
  {name:"Cúpula de la Roca", city:"Jerusalén", country:"Palestina", lat:31.7781, lng:35.2354, denom:"historica", year:691, note:"Santuario omeya sobre la Roca Sagrada. Icono de Jerusalén. No es técnicamente una mezquita."},

  // === TURQUÍA ===
  {name:"Mezquita Azul (Sultanahmet)", city:"Estambul", country:"Turquía", lat:41.0054, lng:28.9768, denom:"sunni", year:1616, note:"Seis minaretes. Azulejos de Iznik. Frente a Santa Sofía."},
  {name:"Mezquita de Süleymaniye", city:"Estambul", country:"Turquía", lat:41.0162, lng:28.9637, denom:"sunni", year:1558, note:"Obra maestra de Mimar Sinan. La mayor mezquita otomana de Estambul."},
  {name:"Mezquita de Selimiye", city:"Edirne", country:"Turquía", lat:41.6780, lng:26.5591, denom:"sunni", year:1575, note:"La obra cumbre de Sinan. UNESCO. Cúpula que rivaliza con Santa Sofía."},
  {name:"Mezquita de Fatih", city:"Estambul", country:"Turquía", lat:41.0197, lng:28.9500, denom:"sunni", year:1771, note:"Reconstruida tras terremoto. Primera gran mezquita imperial otomana."},
  {name:"Mezquita Çamlıca", city:"Estambul", country:"Turquía", lat:41.0286, lng:29.0700, denom:"sunni", year:2019, note:"La mezquita más grande de Turquía. Capacidad: 63.000 fieles."},
  {name:"Mezquita de Eyüp Sultan", city:"Estambul", country:"Turquía", lat:41.0481, lng:28.9342, denom:"sunni", year:1458, note:"Tumba de Abu Ayyub al-Ansari, compañero del Profeta."},
  {name:"Gran Mezquita de Bursa", city:"Bursa", country:"Turquía", lat:40.1840, lng:29.0598, denom:"sunni", year:1399, note:"Ulu Cami. 20 cúpulas. Caligrafía monumental."},

  // === EGIPTO ===

  showVisitedOnly: false
};

const VISITED_KEY = 'mazo_mezquitas_visited_v1';
const visitedIds = new Set(loadVisitedIds());

function loadVisitedIds() {
  try {
    const raw = localStorage.getItem(VISITED_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(Number.isInteger);
  } catch {
    return [];
  }
}

function saveVisitedIds() {
  localStorage.setItem(VISITED_KEY, JSON.stringify([...visitedIds]));
}

function isVisited(id) {
  return visitedIds.has(id);
}

function toggleVisited(id) {
  if (visitedIds.has(id)) visitedIds.delete(id);
  else visitedIds.add(id);
  saveVisitedIds();
  const marker = markers.find(m => m._data._id === id);
  if (marker) {
    marker.setIcon(createMarkerIcon(marker._data));
    marker.setPopupContent(buildPopup(marker._data));
  }
  render();
}

});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &middot; &copy; CARTO &middot; Forja Nova',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// === MARKERS ===
const markers = [];

function createMarkerIcon(d) {
  const color = DENOMS[d.denom].color;
  const visitedClass = isVisited(d._id) ? ' is-visited' : '';
  return L.divIcon({
    className: '',
    html: `<div class="mosque-marker${visitedClass}" style="background:${color};color:${color}"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });
}

DATA.forEach((d, idx) => {
  d._id = idx;
  const icon = createMarkerIcon(d);
  const marker = L.marker([d.lat, d.lng], { icon });
  marker.bindPopup(buildPopup(d), { maxWidth: 320, closeButton: true });
  marker._data = d;
  markers.push(marker);
});

function buildPopup(d) {
  const denom = DENOMS[d.denom];
  const visited = isVisited(d._id);
  return `
    <div class="popup-denom-bar" style="background:${denom.color}"></div>
    <div class="popup-inner">
      <div class="popup-name">${d.name}</div>
      <div class="popup-loc">${d.city} &middot; ${d.country}</div>
      <dl class="popup-meta">
        <dt>Tradici&oacute;n</dt><dd>${denom.label}</dd>
        ${d.year ? `<dt>Fundaci&oacute;n</dt><dd>${d.year}</dd>` : ''}
      </dl>
      ${d.note ? `<div class="popup-note">${d.note}</div>` : ''}
      <div class="popup-actions">
        <button class="visit-btn ${visited ? 'visited' : ''}" data-visit-id="${d._id}">${visited ? '&#10003; Visitada' : 'Marcar visitada'}</button>
      </div>
      <a class="popup-link" href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lng}" target="_blank" rel="noopener">&rarr; ver en mapa</a>
    </div>
  `;
}

// === FILTERS UI ===
const filtersEl = document.getElementById('filters');
const denomChips = {};
const denomCountEls = {};
Object.entries(DENOMS).forEach(([key, info]) => {
  const count = DATA.filter(d => d.denom === key).length;
  const chip = document.createElement('div');
  chip.className = 'filter-chip active';
  chip.dataset.denom = key;
  chip.innerHTML = `
    <span class="dot"></span>
    <span class="label">${info.label}</span>
    <span class="count">${count}</span>
  `;
  chip.addEventListener('click', () => {
    if (state.activeDenoms.has(key)) state.activeDenoms.delete(key);
    else state.activeDenoms.add(key);
    chip.classList.toggle('active');
    render();
  });
  denomChips[key] = chip;
  denomCountEls[key] = chip.querySelector('.count');
  filtersEl.appendChild(chip);
});

const visitedFilterChip = document.createElement('div');
visitedFilterChip.className = 'filter-chip';
visitedFilterChip.dataset.denom = 'visitadas';
visitedFilterChip.innerHTML = `
  <span class="dot"></span>
  <span class="label">Visitadas</span>
  <span class="count" id="visited-filter-count">${visitedIds.size}</span>
`;
visitedFilterChip.addEventListener('click', () => {
  state.showVisitedOnly = !state.showVisitedOnly;
  visitedFilterChip.classList.toggle('active', state.showVisitedOnly);
  render();
});
filtersEl.appendChild(visitedFilterChip);

// === SEARCH ===
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', (e) => {
  state.searchTerm = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById('filter-all').addEventListener('click', () => {
  state.activeDenoms = new Set(Object.keys(DENOMS));
  Object.values(denomChips).forEach(chip => chip.classList.add('active'));
  render();
});

document.getElementById('filter-none').addEventListener('click', () => {
  state.activeDenoms.clear();
  Object.values(denomChips).forEach(chip => chip.classList.remove('active'));
  render();
});

document.getElementById('filter-reset').addEventListener('click', () => {
  state.activeDenoms = new Set(Object.keys(DENOMS));
  state.showVisitedOnly = false;
  state.searchTerm = '';
  searchEl.value = '';
  Object.values(denomChips).forEach(chip => chip.classList.add('active'));
  visitedFilterChip.classList.remove('active');
  render();
});

// === LIST ===
const listEl = document.getElementById('list');
const visibleCountEl = document.getElementById('visible-count');
const totalCountEl = document.getElementById('total-count');
totalCountEl.textContent = DATA.length;

function matchesSearch(d) {
  if (!state.searchTerm) return true;
  const hay = `${d.name} ${d.city} ${d.country}`.toLowerCase();
  return hay.includes(state.searchTerm);
}

function filteredData() {
  return DATA.filter(d => {
    if (!state.activeDenoms.has(d.denom)) return false;
    if (state.showVisitedOnly && !isVisited(d._id)) return false;
    if (!matchesSearch(d)) return false;
    return true;
  });
}

function render() {
  const visible = filteredData();
  visibleCountEl.textContent = visible.length;
  const visitedFilterCountEl = document.getElementById('visited-filter-count');
  if (visitedFilterCountEl) visitedFilterCountEl.textContent = visitedIds.size;
  Object.keys(DENOMS).forEach(key => {
    const count = DATA.filter(d => d.denom === key && (!state.showVisitedOnly || isVisited(d._id)) && matchesSearch(d)).length;
    if (denomCountEls[key]) denomCountEls[key].textContent = count;
    if (denomChips[key]) denomChips[key].classList.toggle('is-empty', count === 0);
  });

  // Markers
  markers.forEach(m => {
    const shouldShow = visible.some(v => v._id === m._data._id);
    if (shouldShow && !map.hasLayer(m)) m.addTo(map);
    else if (!shouldShow && map.hasLayer(m)) map.removeLayer(m);
  });

  // List
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">sin resultados</div>';
    return;
  }
  const sorted = [...visible].sort((a,b) => a.name.localeCompare(b.name, 'es'));
  sorted.forEach(d => {
    const denom = DENOMS[d.denom];
    const item = document.createElement('div');
    item.className = 'list-item';
    if (isVisited(d._id)) item.classList.add('visited');
    if (state.selectedId === d._id) item.classList.add('active');
    item.innerHTML = `
      <div class="list-item-name">${d.name}${isVisited(d._id) ? '<span class="list-item-check">&#10003;</span>' : ''}</div>
      <div class="list-item-meta">
        <span class="denom-dot" style="background:${denom.color}"></span>
        <span>${d.city} &middot; ${d.country}</span>
      </div>
    `;
    item.addEventListener('click', () => {
      state.selectedId = d._id;
      const marker = markers.find(m => m._data._id === d._id);
      if (marker) {
        map.flyTo([d.lat, d.lng], 10, { duration: 0.9 });
        setTimeout(() => marker.openPopup(), 950);
      }
      render();
    });
    listEl.appendChild(item);
  });
}

render();

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.visit-btn');
  if (!btn) return;
  const id = Number(btn.dataset.visitId);
  if (!Number.isInteger(id)) return;
  toggleVisited(id);
});

// === MOBILE SIDEBAR TOGGLE ===
const sidebar = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.add('open');
  sidebarToggle.style.display = 'none';
});
sidebarClose.addEventListener('click', () => {
  sidebar.classList.remove('open');
  sidebarToggle.style.display = '';
});
listEl.addEventListener('click', (e) => {
  if (e.target.closest('.list-item') && window.innerWidth <= 768) {
    sidebar.classList.remove('open');
    sidebarToggle.style.display = '';
  }
});
}; // end __initMazo

// Auto-init
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof L !== 'undefined') window.__initMazo();
  });
} else {
  if (typeof L !== 'undefined') window.__initMazo();
}
</script>
</body>
</html>
